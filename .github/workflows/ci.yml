name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint and focused tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: >
          npm test -- --runInBand
          src/hooks/use-save-progress.test.tsx
          src/hooks/use-progress-data.test.tsx
          src/hooks/use-player-timer.test.tsx
          src/stores/use-player-store.test.ts
